name: Create Release Assets

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build APK, Web, and Source Zip
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Build Web (release)
        run: |
          flutter build web --release \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Zip web build
        run: |
          cd build/web
          zip -r ../../sparkle_lite-web-${{ github.ref_name }}.zip .
          cd ../..

      - name: Zip source code
        run: |
          git archive --format=zip --output=sparkle_lite-source-${{ github.ref_name }}.zip HEAD

      - name: Rename APK for clarity
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             sparkle_lite-${{ github.ref_name }}.apk

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sparkle_lite-${{ github.ref_name }}.apk
            sparkle_lite-web-${{ github.ref_name }}.zip
            sparkle_lite-source-${{ github.ref_name }}.zip
          generate_release_notes: true
